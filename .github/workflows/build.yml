name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.2
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Packages pgp-key-map.list into the jar and confirms the POM is valid.
      # The keys map itself is exercised by the parent module's integration
      # tests, which resolve this artifact and run pgpverify against it.
      - name: Build
        run: mvn -B verify